</head>

<body>
    <header>
        <div class="logo"><img src="/image/DALL·E-2024-09-17-13.05.jpg" alt="logo"></div>
        <div id="menu-toggle">☰</div>
        <p>Bienvenue sur mon portfolio</p>

        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Accueil</a></li>

            </ul>
        </nav>
    </header>
    <section id="contact" class="section">
        <div class="background">
            <div class="container">
                <div class="screen">
                    <div class="screen-header">
                        <div class="screen-header-left">
                            <div class="screen-header-button close"></div>
                            <div class="screen-header-button maximize"></div>
                            <div class="screen-header-button minimize"></div>
                        </div>
                        <div class="screen-header-right">
                            <div class="screen-header-ellipsis"></div>
                            <div class="screen-header-ellipsis"></div>
                            <div class="screen-header-ellipsis"></div>
                        </div>
                    </div>
                    <div class="screen-body">
                        <div class="screen-body-item left">
                            <div class="app-title">
                                <span>CONTACT</span>
                                <span>US</span>
                            </div>
                            
                            <div class="app-contact">CONTACT INFO : 07 67 28 55 92</div>
                        </div>
                        <div class="screen-body-item">
                            <form action="https://formspree.io/f/xjkgoyrz" method="POST" class="app-form">
                                <div class="app-form-group">
                                    <input class="app-form-control" placeholder="NAME" name="name" required>
                                </div>
                                <div class="app-form-group">
                                    <input class="app-form-control" placeholder="EMAIL" name="email" type="email"
                                        required>
                                </div>
                                <div class="app-form-group message">
                                    <input class="app-form-control" placeholder="MESSAGE" name="message" required>
                                </div>
                                <div class="app-form-group buttons">
                                    <button type="reset" class="app-form-button">CANCEL</button>
                                    <button type="submit" class="app-form-button">SEND</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
